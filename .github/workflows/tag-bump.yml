name: Auto Tag Bump

on:
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: write

jobs:
  bump:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Determine bump level from labels
        id: bump
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          echo "PR labels: $LABELS"

          if echo "$LABELS" | grep -q 'bump:major'; then
            echo "level=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q 'bump:minor'; then
            echo "level=minor" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q 'bump:patch'; then
            echo "level=patch" >> "$GITHUB_OUTPUT"
          else
            echo "No bump label found, skipping."
            echo "level=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next tag
        if: steps.bump.outputs.level != 'none'
        id: tag
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "Current latest: $LATEST"

          MAJOR=$(echo "$LATEST" | sed 's/v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\1/')
          MINOR=$(echo "$LATEST" | sed 's/v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\2/')
          PATCH=$(echo "$LATEST" | sed 's/v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\3/')

          case "${{ steps.bump.outputs.level }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumping to $NEXT"

      - name: Create and push tag
        if: steps.bump.outputs.level != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.tag.outputs.next }}" -m "${{ steps.tag.outputs.next }}: ${{ github.event.pull_request.title }}"
          git push origin "${{ steps.tag.outputs.next }}"
