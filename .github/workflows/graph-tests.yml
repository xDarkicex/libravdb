name: Graph Layer Tests

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test on ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.os == 'darwin' && 'macos-latest' || 'ubuntu-latest' }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Run graph, HNSW, and SIMD tests
        run: GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go test -v -race ./internal/graph/... ./internal/index/hnsw ./internal/util/simd
